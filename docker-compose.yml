services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: novellia
      POSTGRES_PASSWORD: novellia
      POSTGRES_DB: novellia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novellia"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://novellia:novellia@db:5432/novellia
      FHIR_DATA_FILE: data/fhir_data.jsonl
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
